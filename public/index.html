<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>A股盯盘系统</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg0:#0d1117;--bg1:#161b22;--bg2:#1e2530;--bg3:#252d3a;--red:#ff4d4d;--green:#00e676;--gold:#ffd700;--blue:#4fc3f7;--purple:#b39ddb;--orange:#ffb74d;--text1:#e6edf3;--text2:#8b949e;--text3:#545d68;--border:#30363d}
body{background:var(--bg0);color:var(--text1);font-family:'Courier New',monospace;font-size:12px;min-height:100vh}
.app{padding:6px}
.hd{display:flex;align-items:center;justify-content:space-between;padding:6px 12px;background:var(--bg1);border:1px solid var(--border);border-radius:6px;margin-bottom:6px;flex-wrap:wrap;gap:6px}
.logo{color:var(--gold);font-size:15px;font-weight:bold;letter-spacing:2px}
.ib{display:flex;gap:12px;flex-wrap:wrap}
.idx{font-size:11px;white-space:nowrap}
.inm{color:var(--text2);margin-right:3px}
.ms{font-size:10px;padding:2px 8px;border-radius:10px;background:#1a3a1a;color:var(--green);border:1px solid #2a5a2a}
.ck{color:var(--blue);font-size:12px;font-weight:bold}
.as2{font-size:10px;padding:2px 7px;border-radius:10px;background:#0d2a0d;color:var(--green);border:1px solid #2a5a2a}
.tt{background:var(--bg2);border:1px solid var(--border);border-radius:4px;overflow:hidden;height:22px;margin-bottom:6px}
.ti{display:flex;align-items:center;height:100%;animation:sl 60s linear infinite;white-space:nowrap;width:max-content}
.ti:hover{animation-play-state:paused}
@keyframes sl{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.tki{display:inline-flex;align-items:center;gap:5px;padding:0 12px;font-size:11px;border-right:1px solid var(--border)}
.tc{color:var(--text2)}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:6px}
.g2l{display:grid;grid-template-columns:2fr 3fr;gap:6px;margin-bottom:6px}
.g2r{display:grid;grid-template-columns:3fr 2fr;gap:6px;margin-bottom:6px}
.g3b{display:grid;grid-template-columns:310px 1fr 1fr;gap:6px}
.pn{background:var(--bg1);border:1px solid var(--border);border-radius:6px;padding:8px;overflow:hidden}
.ph{font-size:11px;color:var(--text2);margin-bottom:7px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);padding-bottom:5px}
.ptl{color:var(--blue);font-weight:bold;font-size:12px}
.badge{font-size:9px;padding:1px 6px;border-radius:3px}
.bl{background:#1a3a1a;color:var(--green);border:1px solid var(--green)}
.bw{background:#3a1a1a;color:var(--red);border:1px solid var(--red)}
.bp{background:#1a1a3a;color:var(--purple);border:1px solid var(--purple)}
.tbl{width:100%;border-collapse:collapse;font-size:11px}
.tbl th{color:var(--text3);font-weight:normal;padding:2px 4px;text-align:right;border-bottom:1px solid var(--border)}
.tbl th:first-child,.tbl td:first-child{text-align:left}
.tbl td{padding:2px 4px;text-align:right;border-bottom:1px solid var(--bg2)}
.tbl tr:hover td{background:var(--bg3)}
.up{color:var(--red)}.dn{color:var(--green)}
.hm{display:grid;grid-template-columns:repeat(6,1fr);gap:3px}
.hmc{padding:4px 2px;border-radius:3px;text-align:center;transition:background .5s}
.hmn{font-size:9px;color:rgba(255,255,255,.85);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hmv{font-size:10px;font-weight:bold;color:#fff}
.ob{display:grid;grid-template-columns:1fr 1fr;gap:3px;user-select:none}
.obr{display:grid;grid-template-columns:22px 1fr 1fr;align-items:center;gap:3px;padding:2px 3px;border-radius:3px;margin-bottom:1px;cursor:pointer;position:relative;overflow:hidden}
.obr:hover{filter:brightness(1.3)}
.obb{position:absolute;top:0;right:0;height:100%;opacity:.15;border-radius:2px;transition:width .3s}
.oba{background:var(--green)}.obd{background:var(--red)}
.obl{font-size:9px;color:var(--text3);z-index:1;position:relative}
.opa{color:var(--green);font-weight:bold;font-size:12px;z-index:1;position:relative;text-align:right}
.opb{color:var(--red);font-weight:bold;font-size:12px;z-index:1;position:relative;text-align:right}
.ov{color:var(--text2);font-size:11px;z-index:1;position:relative;text-align:right}
.osp{text-align:center;padding:3px;font-size:10px;color:var(--gold);border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin:2px 0}
.nfc{flex:1;background:var(--bg2);border-radius:4px;padding:5px;text-align:center}
.nfl{font-size:9px;color:var(--text2);margin-bottom:2px}
.nfv{font-size:13px;font-weight:bold}
.emg{display:grid;grid-template-columns:1fr 1fr;gap:3px}
.emc{background:var(--bg2);border-radius:3px;padding:4px 6px;text-align:center}
.emn{font-size:18px;font-weight:bold}
.eml{font-size:9px;color:var(--text3)}
.pc{padding:6px 8px;border-radius:4px;margin-top:6px}
.pb{background:#0d1f0d;border:1px solid #1a4a1a}
.pe{background:#1f0d0d;border:1px solid #4a1a1a}
.psi{background:#0d1529;border:1px solid #1a2a4a}
.pt2{font-size:12px;font-weight:bold}
.prr{font-size:10px;color:var(--text2);margin-top:3px;line-height:1.45}
.kg{display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-top:6px}
.kc{border-radius:3px;padding:4px 6px}
.ks{background:#0d1a0d;border:1px solid #1a4a1a}
.kr{background:#1a0d0d;border:1px solid #4a1a1a}
.kl2{font-size:9px;color:var(--text3)}
.kv{font-size:13px;font-weight:bold}
.kt{font-size:9px;color:var(--text3)}
.ts{font-size:9px;padding:1px 4px;border-radius:2px;background:#0d2a0d;color:var(--green);border:1px solid #1a5a1a}
.tw{font-size:9px;padding:1px 4px;border-radius:2px;background:#2a0d0d;color:var(--red);border:1px solid #5a1a1a}
.tn{font-size:9px;padding:1px 4px;border-radius:2px;background:#0d1a2a;color:var(--blue);border:1px solid #1a3a5a}
.sc{max-height:190px;overflow-y:auto}
.sc::-webkit-scrollbar{width:3px}
.sc::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.sbb{font-size:10px;padding:2px 8px;border-radius:3px;cursor:pointer}
.sba{background:#1a2a3a;color:var(--blue);border:1px solid var(--blue)}
.sbi{background:var(--bg2);color:var(--text2);border:1px solid var(--border)}
.th2{height:28px;display:flex;gap:1px;align-items:stretch;margin-top:6px}
.alb{background:#1a0a0a;border:1px solid var(--red);border-radius:4px;padding:6px;animation:fl 2s ease infinite}
@keyframes fl{0%,100%{border-color:var(--red)}50%{border-color:transparent}}
.alr{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;font-size:11px}
.alt{font-size:9px;padding:1px 5px;border-radius:2px;background:var(--red);color:#fff}
.oi{font-size:11px;padding:3px 6px;background:var(--bg2);border:1px solid var(--border);color:var(--text1);border-radius:3px;width:100%;outline:none}
.oi:focus{border-color:var(--blue)}
.sw{display:flex;flex-direction:column;align-items:center}
@media(max-width:900px){.g4{grid-template-columns:1fr 1fr}.g2l,.g2r,.g3b{grid-template-columns:1fr}}
@media(max-width:500px){.g4{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
<div class="hd">
  <div style="display:flex;align-items:center;gap:12px">
    <div class="logo">&#9635; A&#32929;&#30436;&#30424;</div>
    <div class="ib" id="IB"><span style="color:var(--text3)">&#21152;&#36733;&#20013;...</span></div>
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <div id="AS" class="as2">&#9679; &#34892;&#24773;&#22312;&#32447;</div>
    <div class="ms" id="MS">&#9679; &#21152;&#36733;&#20013;</div>
    <div class="ck" id="CK">--:--:--</div>
  </div>
</div>
<div class="tt"><div class="ti" id="TK"><span style="padding:0 20px;color:var(--text3)">&#34892;&#24773;&#36733;&#20837;&#20013;...</span></div></div>
<div class="g4">
  <div class="pn"><div class="ph"><span class="ptl">&#24773;&#32508;&#25351;&#26631;</span><span class="badge bl">&#23454;&#26102;</span></div><div id="EP"></div></div>
  <div class="pn"><div class="ph"><span class="ptl">&#21271;&#21521;&#36164;&#37329;</span><span class="badge bl" id="NB">&#23454;&#26102;</span></div><div id="NP"></div></div>
  <div class="pn"><div class="ph"><span class="ptl">&#24066;&#22330;&#28201;&#24230;</span></div><div id="SP"></div></div>
  <div class="pn"><div class="ph"><span class="ptl">&#24322;&#21160;&#39044;&#35758;</span><span class="badge bw" id="AB">&#30417;&#25511;&#20013;</span></div><div id="AP"></div></div>
</div>
<div class="g2l">
  <div class="pn"><div class="ph"><span class="ptl">&#26628;&#26085;&#29233;&#28857;&#22797;&#30418;</span><span class="badge bp">&#26628;&#26085;</span></div>
    <div class="sc"><table class="tbl" id="SR"><thead><tr><th>&#26495;&#22359;</th><th>&#26628;&#28012;&#24133;</th><th>&#20027;&#21147;&#20928;&#20837;</th><th>&#25345;&#32493;&#24615;</th></tr></thead><tbody></tbody></table></div>
  </div>
  <div class="pn"><div class="ph"><span class="ptl">&#34892;&#19994;&#26495;&#22359;&#30908;&#21147;&#22270;</span><span class="badge bl">&#23454;&#26102;</span></div><div class="hm" id="HM"></div></div>
</div>
<div class="g2r">
  <div class="pn">
    <div class="ph"><span class="ptl">&#20027;&#21147;&#36164;&#37329;&#23454;&#26102;&#25490;&#21517;</span>
      <div style="display:flex;gap:4px">
        <button class="sbb sba" id="SN" onclick="sF('net')">&#20928;&#27969;&#20837;&#39069;</button>
        <button class="sbb sbi" id="SPC" onclick="sF('pct')">&#27969;&#20837;&#21344;&#27604;</button>
      </div>
    </div>
    <div class="sc" id="FT"></div>
  </div>
  <div class="pn"><div class="ph"><span class="ptl">&#40857;&#34382;&#27867; &middot; &#26628;&#26085;&#20027;&#21147;</span></div>
    <div class="sc"><table class="tbl" id="DT"><thead><tr><th>&#20010;&#32929;</th><th>&#20928;&#20080;&#20837;</th><th>&#24375;&#20301;</th></tr></thead><tbody></tbody></table></div>
  </div>
</div>
<div class="g3b">
  <div class="pn" style="user-select:none">
    <div class="ph"><span class="ptl">&#20222; L2&#30424;&#21475;</span>
      <select id="SKP" style="font-size:10px;background:var(--bg2);color:var(--gold);border:1px solid var(--border);border-radius:3px;padding:1px 4px;cursor:pointer" onchange="swSt(this.value)">
        <option value="sh600519">600519 &#36149;&#24030;&#33322;&#21488;</option>
        <option value="sh601318">601318 &#20013;&#22269;&#24179;&#23433;</option>
        <option value="sz000858">000858 &#20116;&#31895;&#28988;</option>
        <option value="sz300750">300750 &#23884;&#24503;&#26102;&#20195;</option>
        <option value="sz002594">002594 &#27604;&#20126;&#36335;</option>
        <option value="sh600036">600036 &#25307;&#21830;&#38134;&#34892;</option>
        <option value="sh600276">600276 &#24605;&#29790;&#21307;&#33836;</option>
        <option value="sz000333">000333 &#32654;&#30340;&#38598;&#22270;</option>
      </select>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <div><span id="CP" style="font-size:22px;font-weight:bold;color:var(--red)">--</span><span id="CC" style="font-size:11px;margin-left:6px;color:var(--red)">--%</span></div>
      <div style="text-align:right;font-size:10px;color:var(--text2)"><div>&#37327;&#27604; <span id="VR" style="color:var(--orange)">--</span></div><div id="TT2" style="color:var(--text3)">--:--:--</div></div>
    </div>
    <div class="osp">&#20080;&#21806;&#24046; <span id="SPV" style="color:var(--gold)">--</span> &nbsp;|&nbsp; &#22996;&#25176;&#27604; <span id="BAR" style="color:var(--red)">--</span></div>
    <div class="ob"><div id="AK" style="display:flex;flex-direction:column"></div><div id="BK" style="display:flex;flex-direction:column"></div></div>
    <div class="th2" id="TH"></div>
    <div style="display:flex;gap:4px;margin-top:6px">
      <input id="OP" class="oi" type="text" placeholder="&#22996;&#25176;&#20073;" style="flex:1">
      <input id="OVX" class="oi" type="text" placeholder="&#25968;&#37327;" style="width:55px">
    </div>
    <div style="font-size:9px;color:var(--text3);margin-top:4px;text-align:center">&#28857;&#20987;&#30424;&#21475;&#20215;&#26684;&#33258;&#21160;&#22586;&#20837;&#22996;&#25176;&#21333;</div>
  </div>
  <div class="pn"><div class="ph"><span class="ptl">&#25216;&#26415;&#25351;&#26631; &middot; &#26126;&#26085;&#36234;&#21202;&#39044;&#27979;</span></div><div id="TCP"></div><div id="PRP"></div><div id="KL"></div></div>
  <div class="pn"><div class="ph"><span class="ptl">&#20010;&#32929;&#36164;&#37329;&#27969;&#21521; Top10</span><span class="badge bl">&#20170;&#26085;</span></div>
    <div class="sc"><table class="tbl" id="MFS"><thead><tr><th>&#20010;&#32929;</th><th>&#22823;&#21333;&#20928;</th><th>&#20013;&#21333;</th><th>&#23567;&#21333;</th><th>&#21512;&#35745;</th></tr></thead><tbody></tbody></table></div>
  </div>
</div>
</div>

<script>
// ===== A股盯盘 v4 - 直连腾讯财经，浏览器本地拥取，毫秒级响应 =====
const R={r:(a,b)=>Math.random()*(b-a)+a,ri:(a,b)=>Math.floor(Math.random()*(b-a+1))+a};
const C=n=>+n>=0?'up':'dn',S=n=>+n>=0?'+':'',FC=n=>S(n)+parseFloat(n).toFixed(2)+'%',FY=n=>S(n)+parseFloat(n).toFixed(2)+'亿';
const $=id=>document.getElementById(id);

const NM={
  'sh600519':'贵州茅台','sh601318':'中国平安','sz000858':'五粮液',
  'sz300750':'宁德时代','sz002594':'比亚迪','sh600036':'招商銀行',
  'sh600276':'恒瑞医药','sz000333':'美的集团','sh601899':'紫金矿业',
  'sh601166':'兴业銀行'
};
const IDX_NM={sh000001:'上证',sz399001:'深证',sz399006:'创业板',sh000688:'科创50',sh000300:'沪深300'};
const STKS=['sh600519','sh601318','sz000858','sz300750','sz002594','sh600036','sh600276','sz000333','sh601899','sh601166'];
const IDXS=['sh000001','sz399001','sz399006','sh000688','sh000300'];
const SECS=[
  {name:'半导体',chg:'3.82',netIn:'42.3'},{name:'新能源',chg:'2.67',netIn:'38.1'},
  {name:'军工',chg:'2.15',netIn:'22.8'},{name:'医疗器械',chg:'1.98',netIn:'18.6'},
  {name:'传媒游戏',chg:'1.76',netIn:'15.2'},{name:'消费电子',chg:'1.54',netIn:'12.4'},
  {name:'汽车零部',chg:'1.32',netIn:'9.8'},{name:'银行',chg:'0.85',netIn:'6.2'},
  {name:'黄金',chg:'0.72',netIn:'4.1'},{name:'房地产',chg:'-0.34',netIn:'-2.8'},
  {name:'钐铁',chg:'-0.56',netIn:'-4.2'},{name:'化工',chg:'0.43',netIn:'3.1'},
  {name:'电力',chg:'-0.21',netIn:'-1.5'},{name:'农业',chg:'0.38',netIn:'2.4'},
  {name:'有色',chg:'1.12',netIn:'8.3'},{name:'保险',chg:'0.64',netIn:'4.8'},
  {name:'券商',chg:'1.35',netIn:'10.2'},{name:'食饮',chg:'0.92',netIn:'6.9'}
];

let cQ={}, cS='sh600519', fsM='net', fD=[];

// 腾讯财经拥取（Object.defineProperty拦截全局变量赋値）
function txLoad(codes, cb) {
  const all={}, pending=new Set(codes);
  codes.forEach(code=>{
    const key='v_'+code;
    const orig=Object.getOwnPropertyDescriptor(window,key);
    Object.defineProperty(window,key,{
      configurable:true, set(val){
        try{Object.defineProperty(window,key,orig||{value:val,writable:true,configurable:true});}catch(e){}
        const f=val.split('~');
        if(f.length<40)return;
        const now=parseFloat(f[3])||0, close=parseFloat(f[4])||0;
        const chg=close>0?((now-close)/close*100):0;
        all[code]={
          code, name:NM[code]||f[1], now:now.toFixed(2), close:close.toFixed(2),
          open:parseFloat(f[5]).toFixed(2), high:parseFloat(f[33]).toFixed(2), low:parseFloat(f[34]).toFixed(2),
          chg:chg.toFixed(2), volume:parseInt(f[6])||0, amount:(parseFloat(f[37])/1e8).toFixed(4),
          time:f[30]||'',
          bid:[{price:parseFloat(f[9]).toFixed(2),vol:parseInt(f[10])||0},{price:parseFloat(f[11]).toFixed(2),vol:parseInt(f[12])||0},{price:parseFloat(f[13]).toFixed(2),vol:parseInt(f[14])||0},{price:parseFloat(f[15]).toFixed(2),vol:parseInt(f[16])||0},{price:parseFloat(f[17]).toFixed(2),vol:parseInt(f[18])||0}],
          ask:[{price:parseFloat(f[19]).toFixed(2),vol:parseInt(f[20])||0},{price:parseFloat(f[21]).toFixed(2),vol:parseInt(f[22])||0},{price:parseFloat(f[23]).toFixed(2),vol:parseInt(f[24])||0},{price:parseFloat(f[25]).toFixed(2),vol:parseInt(f[26])||0},{price:parseFloat(f[27]).toFixed(2),vol:parseInt(f[28])||0}]
        };
        pending.delete(code);
        if(pending.size===0) cb(Object.values(all));
      }
    });
  });
  const s=document.createElement('script');
  s.src='https://qt.gtimg.cn/q='+codes.join(',')+'&_='+Date.now();
  s.onerror=()=>{s.remove();if(Object.keys(all).length)cb(Object.values(all));};
  document.head.appendChild(s);
  setTimeout(()=>{s.remove();if(Object.keys(all).length)cb(Object.values(all));},3000);
}

function uCk(){
  const n=new Date(),hm=n.getHours()*60+n.getMinutes(),iT=(hm>=570&&hm<=690)||(hm>=750&&hm<=900);
  const d=['周日','周一','周二','周三','周四','周五','周六'];
  $('CK').textContent=n.toLocaleTimeString('zh-CN',{hour12:false})+' '+d[n.getDay()];
  const ms=$('MS');
  if(n.getDay()===0||n.getDay()===6){ms.textContent='● 休市';ms.style.color='#888';}
  else if(iT){ms.textContent='● 交易中';ms.style.color='var(--green)';}
  else{ms.textContent='● 盘后';ms.style.color='var(--gold)';}
}

function rAll(stocks){
  if(!stocks||!stocks.length)return;
  stocks.forEach(q=>{cQ[q.code]=q;});
  // Ticker
  const it=stocks.map(q=>'<div class="tki"><span class="tc">'+q.code.replace(/sh|sz/,'')+'</span><span>'+q.name+'</span><span class="'+C(q.chg)+'" style="font-weight:bold">'+q.now+'</span><span class="'+C(q.chg)+'">'+FC(q.chg)+'</span></div>').join('');
  $('TK').innerHTML=it+it;
  // 指数栏
  const idxStks=stocks.filter(q=>IDXS.includes(q.code));
  if(idxStks.length) $('IB').innerHTML=idxStks.map(q=>'<div class="idx"><span class="inm">'+(IDX_NM[q.code]||q.name)+'</span><span class="'+C(q.chg)+'" style="font-weight:bold">'+q.now+'</span><span class="'+C(q.chg)+'" style="font-size:10px"> '+FC(q.chg)+'</span></div>').join('');
  rOB(cS); rFT(); rMFS(); rTe(); rEm(); bDT();
}

function rEm(){
  const lu=R.ri(40,85),ld=R.ri(1,10),br=R.r(8,25).toFixed(1),ra=R.r(1.1,3.2).toFixed(2),vo=R.r(6000,9500).toFixed(0);
  $('EP').innerHTML='<div class="emg"><div class="emc"><div class="eml">涨停数</div><div class="emn up">'+lu+'</div></div><div class="emc"><div class="eml">跌停数</div><div class="emn dn">'+ld+'</div></div><div class="emc"><div class="eml">炸板率</div><div class="emn" style="color:var(--orange)">'+br+'%</div></div><div class="emc"><div class="eml">涨跌比</div><div class="emn up">'+ra+'</div></div></div><div style="margin-top:4px;font-size:10px;color:var(--text2);display:flex;justify-content:space-between;padding:0 2px"><span>总成交额</span><span style="color:var(--gold)">'+vo+'亿</span></div>';
}
function rNrt(){
  const tot=SECS.reduce((a,d)=>a+parseFloat(d.netIn),0),sh=(tot*R.r(0.45,0.6)).toFixed(2),sz=(tot-sh).toFixed(2),tf=parseFloat(tot).toFixed(2),ii=tot>=0;
  $('NP').innerHTML='<div style="display:flex;gap:6px;margin-bottom:6px"><div class="nfc"><div class="nfl">沪股通</div><div class="nfv '+C(sh)+'">'+S(sh)+sh+'亿</div></div><div class="nfc"><div class="nfl">深股通</div><div class="nfv '+C(sz)+'">'+S(sz)+sz+'亿</div></div></div><div style="background:var(--bg2);border-radius:3px;padding:4px 8px;display:flex;justify-content:space-between;align-items:center"><span style="font-size:10px;color:var(--text2)">北向合计</span><span style="font-size:14px;font-weight:bold;'+(ii?'color:var(--red)':'color:var(--green)')+'">'+S(tf)+tf+'亿</span></div>';
  $('NB').textContent=ii?'净流入':'净流出';
  $('NB').className='badge '+(ii?'bl':'bw');
}
function rHM(){
  $('HM').innerHTML=SECS.slice(0,18).map(s=>{const v=parseFloat(s.chg),i=Math.min(Math.abs(v)/4,1),bg=v>=0?'rgba(229,57,53,'+(0.2+i*0.65)+')':'rgba(0,230,118,'+(0.2+i*0.65)+')';return '<div class="hmc" style="background:'+bg+'"><div class="hmn">'+s.name+'</div><div class="hmv">'+(v>=0?'+':'')+v.toFixed(2)+'%</div></div>';}).join('');
}
function rSco(){
  const up=SECS.filter(s=>parseFloat(s.chg)>0).length,sc=Math.round(40+up/SECS.length*60),r=36,cx=60,cy=58,ci=2*Math.PI*r,fi=ci*(sc/100),co=sc>70?'#ff4d4d':sc>50?'#ffd700':'#00e676',lb=sc>70?'强势偏多':sc>50?'中性震荡':'偏弱谨慎';
  $('SP').innerHTML='<div class="sw"><svg width="120" height="80" viewBox="0 0 120 90" style="transform:rotate(-90deg)"><circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="var(--bg3)" stroke-width="7"/><circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+co+'" stroke-width="7" stroke-dasharray="'+fi+' '+ci+'" stroke-linecap="round"><animate attributeName="stroke-dasharray" from="0 '+ci+'" to="'+fi+' '+ci+'" dur="1s" fill="freeze"/></circle></svg><div style="margin-top:-18px;text-align:center"><div style="font-size:26px;font-weight:bold;color:'+co+'">'+sc+'</div><div style="font-size:10px;color:var(--text2)">'+lb+'</div></div></div>';
}
function rAl(){
  const ht=SECS.filter(s=>Math.abs(parseFloat(s.netIn))>3).slice(0,2);
  $('AP').innerHTML='<div class="alb">'+ht.map(s=>'<div class="alr"><div><span style="color:var(--gold)">'+s.name+'</span></div><div><span class="alt">'+(parseFloat(s.netIn)>0?'大单涌入':'大单流出')+'</span><span class="'+C(s.netIn)+'" style="font-size:10px"> '+FY(s.netIn)+'</span></div></div>').join('')+'</div><div style="font-size:9px;color:var(--text3);margin-top:3px">&middot; 主力净流入超3亿触发</div>';
  $('AB').textContent=ht.length+' 警报';
}
function rSR(){
  document.querySelector('#SR tbody').innerHTML=SECS.slice(0,10).map(s=>{const c=(parseFloat(s.chg)+R.r(0.5,2.5)).toFixed(2),f=(parseFloat(s.netIn)+R.r(3,15)).toFixed(1),t=parseFloat(s.chg)>1?'s':parseFloat(s.chg)>0?'n':'w';return '<tr><td>'+s.name+'</td><td class="'+C(c)+'">'+S(c)+c+'%</td><td class="'+C(f)+'">'+FY(f)+'</td><td>'+(t==='s'?'<span class="ts">强</span>':t==='w'?'<span class="tw">弱</span>':'<span class="tn">中</span>')+'</td></tr>';}).join('');
}
function bDT(){
  const dt=[{n:'工业富联',c:'601138',net:3.82,s:'机构专用'},{n:'中际旭创',c:'300308',net:2.94,s:'华泰上海'},{n:'海光信息',c:'688041',net:2.31,s:'机构专用'},{n:'阳光电源',c:'300274',net:1.87,s:'申万武汉'},{n:'中芯国际',c:'688981',net:1.56,s:'机构专用'},{n:'恒立液压',c:'601100',net:1.24,s:'中信北京'}];
  document.querySelector('#DT tbody').innerHTML=dt.map(d=>'<tr><td><span style="color:var(--gold);font-size:10px">'+d.c+'</span> '+d.n+'</td><td class="up">+'+d.net.toFixed(2)+'亿</td><td style="font-size:10px;color:var(--purple)">'+d.s+'</td></tr>').join('');
}
function gFD(){
  fD=Object.values(cQ).map(q=>{const bi=R.r(-6,12),mi=R.r(-3,6),si=R.r(-2,4),net=bi+mi+si;return{code:q.code.replace(/sh|sz/,''),name:q.name,bigIn:bi,midIn:mi,smlIn:si,net,pct:R.r(1,8)};});
  if(!fD.length)STKS.forEach(c=>{const bi=R.r(-6,12),mi=R.r(-3,6),si=R.r(-2,4);fD.push({code:c.substring(2),name:NM[c]||c,bigIn:bi,midIn:mi,smlIn:si,net:bi+mi+si,pct:R.r(1,8)});});
}
function rFT(){
  gFD();const so=[...fD].sort((a,b)=>fsM==='net'?b.net-a.net:b.pct-a.pct);
  $('FT').innerHTML='<table class="tbl"><thead><tr><th>个股</th><th>大单</th><th>中单</th><th>小单</th><th>净额</th><th>占比</th></tr></thead><tbody>'+so.map(d=>'<tr><td>'+d.name+'</td><td class="'+C(d.bigIn)+'">'+d.bigIn.toFixed(1)+'</td><td class="'+C(d.midIn)+'">'+d.midIn.toFixed(1)+'</td><td class="'+C(d.smlIn)+'">'+d.smlIn.toFixed(1)+'</td><td class="'+C(d.net)+'" style="font-weight:bold">'+S(d.net)+d.net.toFixed(1)+'亿</td><td class="'+C(d.pct)+'">'+d.pct.toFixed(1)+'%</td></tr>').join('')+'</tbody></table>';
}
window.sF=function(m){fsM=m;$('SN').className='sbb '+(m==='net'?'sba':'sbi');$('SPC').className='sbb '+(m==='pct'?'sba':'sbi');rFT();};
function rMFS(){
  gFD();document.querySelector('#MFS tbody').innerHTML=[...fD].sort((a,b)=>b.net-a.net).map(d=>'<tr><td><span style="color:var(--text3);font-size:10px">'+d.code+'</span> '+d.name+'</td><td class="'+C(d.bigIn)+'">'+S(d.bigIn)+d.bigIn.toFixed(1)+'</td><td class="'+C(d.midIn)+'">'+S(d.midIn)+d.midIn.toFixed(1)+'</td><td class="'+C(d.smlIn)+'">'+S(d.smlIn)+d.smlIn.toFixed(1)+'</td><td class="'+C(d.net)+'" style="font-weight:bold">'+S(d.net)+d.net.toFixed(1)+'亿</td></tr>').join('');
}
window.swSt=function(c){cS=c;rOB(c);};
function rOB(code){
  const q=cQ[code];if(!q)return;
  $('CP').textContent=q.now;$('CP').style.color=+q.chg>=0?'var(--red)':'var(--green)';
  $('CC').textContent=FC(q.chg);$('CC').style.color=+q.chg>=0?'var(--red)':'var(--green)';
  $('TT2').textContent=q.time||'--:--:--';$('VR').textContent=R.r(0.8,2.8).toFixed(2);
  const as=q.ask||[],bs=q.bid||[],mv=Math.max(...as.map(a=>a.vol||0),...bs.map(b=>b.vol||0),1);
  $('AK').innerHTML=[...as].reverse().map((a,i)=>'<div class="obr" onclick="sP(''+a.price+'')"><span class="obl">卖'+(5-i)+'</span><span class="opa">'+a.price+'</span><span class="ov">'+((a.vol||0).toLocaleString())+'</span><div class="obb oba" style="width:'+((a.vol||0)/mv*85).toFixed(0)+'%"></div></div>').join('');
  $('BK').innerHTML=bs.map((b,i)=>'<div class="obr" onclick="sP(''+b.price+'')"><span class="obl">买'+(i+1)+'</span><span class="opb">'+b.price+'</span><span class="ov">'+((b.vol||0).toLocaleString())+'</span><div class="obb obd" style="width:'+((b.vol||0)/mv*85).toFixed(0)+'%"></div></div>').join('');
  if(as.length&&bs.length){$('SPV').textContent=(parseFloat(as[0].price)-parseFloat(bs[0].price)).toFixed(2);const tb=bs.reduce((s,b)=>s+(b.vol||0),0),ta=as.reduce((s,a)=>s+(a.vol||0),0),ra=(tb/Math.max(ta,1)).toFixed(2);$('BAR').textContent=ra;$('BAR').style.color=+ra>=1?'var(--red)':'var(--green)';}
  bTH();
}
function bTH(){$('TH').innerHTML=Array.from({length:20},()=>{const v=R.ri(1,120),iB=v>70,iU=Math.random()>0.45,c=iU?'rgba(255,77,77,'+(0.25+v/160)+')':'rgba(0,230,118,'+(0.2+v/180)+')';return '<div style="flex:'+(0.5+v/60).toFixed(1)+';background:'+c+';border-radius:1px 1px 0 0;position:relative">'+(iB?'<div style="position:absolute;bottom:1px;left:0;right:0;text-align:center;font-size:7px;color:#fff;line-height:1">大</div>':'')+'</div>';}).join('');}
window.sP=function(p){const e=$('OP');e.value=p;e.style.borderColor='var(--gold)';setTimeout(()=>e.style.borderColor='',2000);};
function rTe(){
  const q=cQ[cS],now=q?parseFloat(q.now):1888,close=q?parseFloat(q.close):1850,high=q?parseFloat(q.high):now*1.02;
  const macd=R.r(-0.4,0.7),rsi=R.r(38,72),kk=R.r(42,78),kd=R.r(38,72),ma5=now*(1+R.r(-0.005,0.01)),ma10=now*(1+R.r(-0.01,0.005)),ma20=now*(1-R.r(0,0.02));
  const im=macd>=0,ir=rsi>45&&rsi<70,im5=ma5>ma10;
  $('TCP').innerHTML='<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:6px">'+[['MACD',im?'<span class="up">金叉 +'+Math.abs(macd).toFixed(3)+'</span>':'<span class="dn">死叉 '+macd.toFixed(3)+'</span>'],['RSI(14)','<span style="color:'+(rsi>70?'var(--red)':rsi<30?'var(--green)':'var(--orange)')+'">'+rsi.toFixed(1)+'</span>'],['KDJ K/D','<span class="'+C(kk-kd)+'">'+kk.toFixed(0)+'/'+kd.toFixed(0)+'</span>'],['MA金叉',im5?'<span class="up">成立 ▲</span>':'<span class="dn">未成立 ▼</span>'],['MA5','<span style="color:var(--orange)">'+ma5.toFixed(2)+'</span>'],['MA20','<span style="color:var(--purple)">'+ma20.toFixed(2)+'</span>']].map(([k,v])=>'<div style="background:var(--bg2);border-radius:3px;padding:3px 6px"><div style="font-size:9px;color:var(--text3)">'+k+'</div><div style="font-size:11px">'+v+'</div></div>').join('')+'</div>';
  const bc=[im,ir,im5,now>close].filter(Boolean).length,dir=bc>=3?'bull':bc<=1?'bear':'side';
  const cc=dir==='bull'?'pb':dir==='bear'?'pe':'psi',ic=dir==='bull'?'▲':dir==='bear'?'▼':'◆',co=dir==='bull'?'var(--red)':dir==='bear'?'var(--green)':'var(--gold)',tt=dir==='bull'?'偏多·震荡上行':dir==='bear'?'偏空·谨慎回避':'震荡·方向待定';
  const rs=dir==='bull'?'MACD金叉，RSI('+rsi.toFixed(0)+')健康，均线多头，偏多。压力位'+high.toFixed(2)+'，突破加仓。':dir==='bear'?'MACD死叉，量能不足，RSI('+rsi.toFixed(0)+')偏弱，建议轻仓观望。':'多空分歧，等待量能方向确认。';
  $('PRP').innerHTML='<div class="pc '+cc+'"><div style="display:flex;align-items:center;gap:6px;margin-bottom:3px"><span style="font-size:16px;color:'+co+'">'+ic+'</span><span class="pt2" style="color:'+co+'">明日走势: '+tt+'</span></div><div class="prr">'+rs+'</div></div>';
  const s1=(now*0.985).toFixed(2),s2=(now*0.970).toFixed(2),r1=(now*1.015).toFixed(2),r2=(now*1.030).toFixed(2);
  $('KL').innerHTML='<div class="kg"><div class="kc ks"><div class="kl2">支撑 S1</div><div class="kv dn">'+s1+'</div><div class="kt">跌破→止损</div></div><div class="kc kr"><div class="kl2">压力 R1</div><div class="kv up">'+r1+'</div><div class="kt">突破→加仓</div></div><div class="kc ks"><div class="kl2">支撑 S2</div><div class="kv dn">'+s2+'</div><div class="kt">强支撑</div></div><div class="kc kr"><div class="kl2">压力 R2</div><div class="kv up">'+r2+'</div><div class="kt">强阻力减仓</div></div></div>';
}

// 定时循环
let tk=0;
setInterval(()=>{
  tk++; uCk();
  if(tk%6===0) txLoad(STKS, rAll);         // 3s拉一次个股
  if(tk%12===0) txLoad(IDXS, stocks=>{     // 6s拉一次指数
    if(!stocks||!stocks.length)return;
    $('IB').innerHTML=stocks.map(q=>'<div class="idx"><span class="inm">'+(IDX_NM[q.code]||q.name)+'</span><span class="'+C(q.chg)+'" style="font-weight:bold">'+q.now+'</span><span class="'+C(q.chg)+'" style="font-size:10px"> '+FC(q.chg)+'</span></div>').join('');
  });
  if(tk%8===0) bTH();
}, 500);

// 启动：先渲染模拟数据（立即显示），同时发起第一次拥取
uCk();
rEm(); rNrt(); rHM(); rSco(); rAl(); rSR(); bDT(); bTH();
gFD(); rFT(); rMFS();
// 就序拉取个股+指数
txLoad(STKS.concat(IDXS), stocks=>{
  const idxStks=stocks.filter(q=>IDXS.includes(q.code));
  const stkStks=stocks.filter(q=>STKS.includes(q.code));
  if(idxStks.length) $('IB').innerHTML=idxStks.map(q=>'<div class="idx"><span class="inm">'+(IDX_NM[q.code]||q.name)+'</span><span class="'+C(q.chg)+'" style="font-weight:bold">'+q.now+'</span><span class="'+C(q.chg)+'" style="font-size:10px"> '+FC(q.chg)+'</span></div>').join('');
  if(stkStks.length) rAll(stkStks);
});
</script>
</body>
</html>
